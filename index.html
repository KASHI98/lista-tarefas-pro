<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVIDADE REAL -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lista de Tarefas Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Minhas Tarefas</h1>

  <div class="input-area">
    <input type="text" id="taskTitle" placeholder="Cabeçalho da tarefa">
    <textarea id="taskBody" placeholder="Descrição da tarefa"></textarea>
    <input type="text" id="taskLink" placeholder="Link (opcional)">
    <input type="color" id="colorPicker" value="#ffffff">
    <button onclick="addTask()">Adicionar</button>
  </div>

  <h2>⭐ Favoritas</h2>
  <ul id="starredList"></ul>

  <h2>📋 Todas</h2>
  <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
